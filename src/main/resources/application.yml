server:
  port: 8087
  servlet:
    session:
      timeout: 120s

spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    username: ${DB_USER:root}
    password: ${DB_PASS:root}
    url: ${DB_URL:jdbc:mysql://192.168.110.10:3306/flz_chat?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      max-lifetime: 500000
      connection-init-sql: SET time_zone = '+08:00'
  jackson:
    time-zone: Asia/Shanghai
  redis:
    host: ${REDIS_HOST:192.168.110.10}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:flz10243145}
  rabbitmq:
    host: ${RABBIT_HOST:192.168.110.10}
    port: ${RABBIT_PORT:5672}
    username: ${RABBIT_USER:root}
    password: ${RABBIT_PASS:root}
    virtual-host: ${RABBIT_VHOST:/}
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 50
        retry:
          enabled: true
          max-attempts: 3
  mail:
    host: ${MAIL_HOST:smtp.163.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USER:15818859598@163.com}
    password: ${MAIL_PASS:PExju3BH7d3N5mtS}
    protocol: smtp
    properties:
      mail.smtp.auth: true
      mail.smtp.ssl.enable: true

jwt:
  header: Authorization
  tokenPrefix: "Bearer "
  secret: ${JWT_SECRET:flz200310240813200206103145}
  expireTime: 86400000
  refreshExpireTime: 604800000
  issuer: flz_business

minio:
  endpoint: ${MINIO_ENDPOINT:http://192.168.110.10:9000}
#  access-key: ${MINIO_AK:15XCdK0Epg1n4smUrIwp}
  access-key: ${MINIO_AK:flz}
#  secret-key: ${MINIO_SK:3ds8TKF56SzG2o0C6dgQOMNUL9oJfHGrz7mnV7Ng}
  secret-key: ${MINIO_SK:flz10243145}
  bucket-public: ${MINIO_BUCKET_PUBLIC:flz-chat-public}
  bucket-chat: ${MINIO_BUCKET_CHAT:flz-chat-media}
  presigned-expiry-days: ${MINIO_PRESIGNED_DAYS:90}
  public-base-url: ${MINIO_PUBLIC_BASE_URL:http://192.168.110.10:9000}

security:
  login:
    max-fail: 5
    lock-minutes: 15
  rate-limit:
    register-per-ip-hour: 5
    forgot-per-email-hour: 3
    send-msg-per-user-min: 60

message:
  filter:
    enabled: ${MESSAGE_FILTER_ENABLED:false}
    sensitive-words:
      - 涉黄
      - 诈骗
      - 赌博

management:
  endpoints:
    web:
      exposure:
        include: health,info

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.flz_chat_business.flz_chat.pojo