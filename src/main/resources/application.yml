server:
  port: 8087
  servlet:
    session:
      timeout: 120s

spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    username: ${DB_USER:}
    password: ${DB_PASS:}
    url: ${DB_URL:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      max-lifetime: 500000
      connection-init-sql: SET time_zone = '+08:00'
  jackson:
    time-zone: Asia/Shanghai
  redis:
    host: ${REDIS_HOST:}
    port: ${REDIS_PORT:}
    password: ${REDIS_PASSWORD:}
  rabbitmq:
    host: ${RABBIT_HOST:}
    port: ${RABBIT_PORT:}
    username: ${RABBIT_USER:}
    password: ${RABBIT_PASS:}
    virtual-host: ${RABBIT_VHOST:/}
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 50
        retry:
          enabled: true
          max-attempts: 3
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:}
    username: ${MAIL_USER:}
    password: ${MAIL_PASS:}
    protocol: smtp
    properties:
      mail.smtp.auth: true
      mail.smtp.ssl.enable: true

jwt:
  header: Authorization
  tokenPrefix: "Bearer "
  secret: ${JWT_SECRET:}
  expireTime: 86400000
  refreshExpireTime: 604800000
  issuer: flz_business

minio:
  endpoint: ${MINIO_ENDPOINT:}
  access-key: ${MINIO_AK:}
  secret-key: ${MINIO_SK:}
  bucket-public: ${MINIO_BUCKET_PUBLIC:}
  bucket-chat: ${MINIO_BUCKET_CHAT:}
  presigned-expiry-days: ${MINIO_PRESIGNED_DAYS:}
  public-base-url: ${MINIO_PUBLIC_BASE_URL:}

security:
  login:
    max-fail: 5
    lock-minutes: 15
  rate-limit:
    register-per-ip-hour: 5
    forgot-per-email-hour: 3
    send-msg-per-user-min: 60

message:
  filter:
    enabled: ${MESSAGE_FILTER_ENABLED:}
    sensitive-words:
      - 涉黄
      - 诈骗
      - 赌博

management:
  endpoints:
    web:
      exposure:
        include: health,info

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.flz_chat_business.flz_chat.pojo